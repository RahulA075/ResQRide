<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ResQRide</title>
    <script>
      // GitHub Pages SPA redirect
      // Stores the path in sessionStorage then redirects to index.html
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var base = '/ResQRide';
      var rest = path.slice(base.length);
      sessionStorage.setItem(
        'redirect',
        rest + search + hash
      );
      window.location.replace(base + '/?p=1');
    </script>
  </head>
  <body></body>
</html>
